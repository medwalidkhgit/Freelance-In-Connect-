server:
  port: 8081

spring:
  application:
    name: auth-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

services:
  freelancer:
    url: ${FREELANCER_SERVICE_URL:http://freelancer-service:8082}
  company:
    url: ${COMPANY_SERVICE_URL:http://company-service:8083}

app:
  otp:
    ttl-minutes: ${OTP_TTL_MINUTES:10}
  dev-otp:
    enabled: ${APP_DEV_OTP_ENABLED:false}
  mail:
    enabled: ${SMTP_ENABLED:false}
    from: ${SMTP_FROM:no-reply@fic.local}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN}

keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:b2b-platform}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:auth-service}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
  user-client-id: ${KEYCLOAK_USER_CLIENT_ID:b2b-app-client}
  user-client-secret: ${KEYCLOAK_USER_CLIENT_SECRET}
  email-verification-required: ${KEYCLOAK_EMAIL_VERIFICATION:false}

  http:
    connect-timeout-ms: ${KEYCLOAK_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${KEYCLOAK_READ_TIMEOUT_MS:5000}

logging:
  level:
    root: INFO
    org.sid.auth_service: DEBUG
    org.keycloak: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
