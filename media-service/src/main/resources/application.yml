server:
  port: 8089

spring:
  application:
    name: media-service
  servlet:
    multipart:
      max-file-size: ${MEDIA_MAX_FILE_SIZE:15MB}
      max-request-size: ${MEDIA_MAX_REQUEST_SIZE:15MB}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URL:${KEYCLOAK_URL:http://localhost:8080}}/realms/${KEYCLOAK_REALM:b2b-platform}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:b2b-platform}/protocol/openid-connect/certs}

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    profile-pictures-container: ${AZURE_STORAGE_PROFILE_PICTURES_CONTAINER:profile-pictures}
    company-logos-container: ${AZURE_STORAGE_COMPANY_LOGOS_CONTAINER:company-logos}
    cvs-container: ${AZURE_STORAGE_CVS_CONTAINER:cvs}
    image-max-bytes: ${MEDIA_IMAGE_MAX_BYTES:5242880}
    cv-max-bytes: ${MEDIA_CV_MAX_BYTES:10485760}
    read-sas-ttl-minutes: ${MEDIA_READ_SAS_TTL_MINUTES:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info
