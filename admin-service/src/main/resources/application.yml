server:
  port: 8086

spring:
  application:
    name: admin-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/admin_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.resourceserver.jwt:
  issuer-uri: ${KEYCLOAK_ISSUER_URL:${KEYCLOAK_URL:http://localhost:8080}}/realms/${KEYCLOAK_REALM:b2b-platform}
  jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:b2b-platform}/protocol/openid-connect/certs}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN:}

services:
  company:
    url: ${COMPANY_SERVICE_URL:http://company-service:8083}
  freelancer:
    url: ${FREELANCER_SERVICE_URL:http://freelancer-service:8082}
  auth:
    url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  mission:
    url: ${MISSION_SERVICE_URL:http://mission-service:8084}

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.context.annotation.AnnotationConfigApplicationContext: DEBUG

feign:
  hystrix:
    enabled: false
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
